<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Image Frame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@100;300;400;700&family=Noto+Serif+JP:wght@200;300;400;700&family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;700&family=EB+Garamond:wght@400;700&family=Montserrat:wght@300;400;700&family=Poppins:wght@300;400;600;700&family=Lato:wght@300;400;700&family=Roboto:wght@300;400;700&family=Open+Sans:wght@300;400;700&family=Inter:wght@300;400;700&family=Source+Sans+3:wght@300;400;700&family=Raleway:wght@300;400;700&family=Oswald:wght@300;400;700&family=Merriweather:wght@300;400;700&family=Libre+Baskerville:wght@400;700&family=Crimson+Text:wght@400;700&family=Fira+Code:wght@400;500&family=Shippori+Mincho:wght@300;400;700&family=Shippori+Mincho+B1:wght@300;400;700&family=Zen+Old+Mincho:wght@300;400;700&family=Zen+Antique&family=Klee+One:wght@400;600&family=Sawarabi+Mincho&family=BIZ+UDPMincho&family=M+PLUS+1p:wght@100;300;400;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Zen+Maru+Gothic:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header__inner">
      <div class="header__brand">
        <svg class="header__logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 16l5-5 4 4 4-5 5 5"/></svg>
        <span class="header__title">X-Image Frame</span>
      </div>
      <button id="cancelBtn" class="header__cancel hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        やり直す
      </button>
    </div>
  </header>

  <main>
    <div id="dropZone" class="drop-zone">
      <div class="drop-zone__inner">
        <div class="drop-zone__icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <p class="drop-zone__text">写真をドラッグ&ドロップ</p>
        <p class="drop-zone__hint"><label for="fileInput" class="drop-zone__link">ファイルを選択</label></p>
        <input type="file" id="fileInput" accept="image/*,.heic,.heif" hidden>
        <div class="drop-zone__formats">JPEG / PNG / WebP / TIFF / HEIC</div>
      </div>
    </div>

    <div id="editor" class="editor hidden">
      <div class="editor__layout">
        <div class="editor__preview">
          <div class="preview__wrapper">
            <canvas id="previewCanvas"></canvas>
          </div>
          <div class="preview__actions">
            <button id="clipboardBtn" class="action-btn" title="クリップボードにコピー">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              コピー
            </button>
            <button id="postXBtn" class="action-btn action-btn--x" title="Xに投稿">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Xに投稿
              <small class="action-hint">自動DL → 📷からアップ</small>
            </button>
            <button id="downloadBtn" class="action-btn action-btn--primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
              ダウンロード
            </button>
          </div>
        </div>

        <aside class="editor__sidebar">
          <section class="panel" data-open="true">
            <button class="panel__header"><span class="panel__title">サイズ</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body">
              <div class="preset-grid">
                <button class="preset active" data-ratio="3:4" data-w="900" data-h="1200"><span class="preset__ratio">3:4</span><span class="preset__label">縦長</span></button>
                <button class="preset" data-ratio="1:1" data-w="1200" data-h="1200"><span class="preset__ratio">1:1</span><span class="preset__label">正方形</span></button>
                <button class="preset" data-ratio="16:9" data-w="1200" data-h="675"><span class="preset__ratio">16:9</span><span class="preset__label">横長</span></button>
                <button class="preset" data-ratio="8:9" data-w="1200" data-h="1350"><span class="preset__ratio">8:9</span><span class="preset__label">2枚用</span></button>
              </div>
            </div>
          </section>

          <section class="panel" data-open="true">
            <button class="panel__header"><span class="panel__title">トリミング</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body">
              <label class="slider"><span>横</span><input type="range" id="cropX" min="0" max="100" value="50"><span class="slider__val" id="cropXVal">50</span></label>
              <label class="slider"><span>縦</span><input type="range" id="cropY" min="0" max="100" value="50"><span class="slider__val" id="cropYVal">50</span></label>
            </div>
          </section>

          <section class="panel" data-open="true">
            <button class="panel__header"><span class="panel__title">フレーム</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body">
              <div class="color-swatches">
                <button class="swatch active" data-color="#ffffff" title="白"><span style="background:#fff"></span></button>
                <button class="swatch" data-color="#f5f5f0" title="オフホワイト"><span style="background:#f5f5f0"></span></button>
                <button class="swatch" data-color="#1a1a1a" title="黒"><span style="background:#1a1a1a"></span></button>
                <button class="swatch" data-color="#0a0a0a" title="ピュアブラック"><span style="background:#0a0a0a"></span></button>
                <input type="color" id="customColor" value="#ffffff" class="swatch-picker" title="カスタム">
              </div>
              <label class="slider"><span>枠幅</span><input type="range" id="framePadding" min="0" max="120" value="40"><span class="slider__val" id="framePaddingVal">40</span></label>
              <label class="slider"><span>バー高</span><input type="range" id="barHeight" min="40" max="200" value="80"><span class="slider__val" id="barHeightVal">80</span></label>
            </div>
          </section>

          <section class="panel" data-open="true">
            <button class="panel__header"><span class="panel__title">Exif</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body">
              <div class="exif-auto" id="exifDisplay"><span class="dim">画像読込で自動取得</span></div>
              <div class="field-grid">
                <label class="field"><span>カメラ</span><input type="text" id="exifCamera" placeholder="NIKON D3"></label>
                <label class="field"><span>レンズ</span><input type="text" id="exifLens" placeholder="TAMRON SP 90mm"></label>
                <label class="field field--half"><span>焦点距離</span><input type="text" id="exifFocal" placeholder="90mm"></label>
                <label class="field field--half"><span>F値</span><input type="text" id="exifFNumber" placeholder="f/4.5"></label>
                <label class="field field--half"><span>SS</span><input type="text" id="exifShutter" placeholder="1/80s"></label>
                <label class="field field--half"><span>ISO</span><input type="text" id="exifISO" placeholder="ISO800"></label>
              </div>
            </div>
          </section>

          <section class="panel" data-open="true">
            <button class="panel__header"><span class="panel__title">書体</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body">
              <select id="fontSelect" class="font-select">
                <optgroup label="Sans-Serif">
                  <option value="DM Sans" selected>DM Sans</option>
                  <option value="Helvetica Neue">Helvetica Neue</option>
                  <option value="Inter">Inter</option>
                  <option value="Roboto">Roboto</option>
                  <option value="Open Sans">Open Sans</option>
                  <option value="Lato">Lato</option>
                  <option value="Montserrat">Montserrat</option>
                  <option value="Poppins">Poppins</option>
                  <option value="Source Sans 3">Source Sans 3</option>
                  <option value="Raleway">Raleway</option>
                  <option value="Oswald">Oswald</option>
                </optgroup>
                <optgroup label="Serif">
                  <option value="Playfair Display">Playfair Display</option>
                  <option value="Cormorant Garamond">Cormorant Garamond</option>
                  <option value="EB Garamond">EB Garamond</option>
                  <option value="Merriweather">Merriweather</option>
                  <option value="Libre Baskerville">Libre Baskerville</option>
                  <option value="Crimson Text">Crimson Text</option>
                  <option value="Georgia">Georgia</option>
                </optgroup>
                <optgroup label="日本語ゴシック">
                  <option value="Noto Sans JP">Noto Sans JP</option>
                  <option value="M PLUS 1p">M PLUS 1p</option>
                  <option value="Zen Kaku Gothic New">Zen 角ゴシック New</option>
                  <option value="Zen Maru Gothic">Zen 丸ゴシック</option>
                </optgroup>
                <optgroup label="日本語ゴシック Light">
                  <option value="Noto Sans JP" data-weight="300">Noto Sans JP Light</option>
                  <option value="M PLUS 1p" data-weight="100">M PLUS 1p Thin</option>
                  <option value="M PLUS 1p" data-weight="300">M PLUS 1p Light</option>
                  <option value="Zen Kaku Gothic New" data-weight="300">Zen 角ゴシック Light</option>
                </optgroup>
                <optgroup label="日本語明朝">
                  <option value="Noto Serif JP">Noto Serif JP</option>
                  <option value="Shippori Mincho">しっぽり明朝</option>
                  <option value="Shippori Mincho B1">しっぽり明朝 B1</option>
                  <option value="Zen Old Mincho">Zen Old 明朝</option>
                  <option value="Zen Antique">Zen Antique</option>
                  <option value="Sawarabi Mincho">さわらび明朝</option>
                  <option value="BIZ UDPMincho">BIZ UD明朝</option>
                </optgroup>
                <optgroup label="日本語明朝 Light">
                  <option value="Noto Serif JP" data-weight="200">Noto Serif JP ExtraLight</option>
                  <option value="Noto Serif JP" data-weight="300">Noto Serif JP Light</option>
                  <option value="Shippori Mincho" data-weight="300">しっぽり明朝 Light</option>
                  <option value="Shippori Mincho B1" data-weight="300">しっぽり明朝 B1 Light</option>
                  <option value="Zen Old Mincho" data-weight="300">Zen Old 明朝 Light</option>
                </optgroup>
                <optgroup label="日本語その他">
                  <option value="Klee One">クレー One</option>
                </optgroup>
                <optgroup label="Monospace">
                  <option value="JetBrains Mono">JetBrains Mono</option>
                  <option value="Fira Code">Fira Code</option>
                </optgroup>
              </select>
              <input type="text" id="fontSearch" class="font-search" placeholder="Google Fontsを検索...">
              <div id="fontResults" class="font-results hidden"></div>
              <label class="slider"><span>上段</span><input type="range" id="fontScaleTitle" min="50" max="200" value="100"><span class="slider__val" id="fontScaleTitleVal">100%</span></label>
              <label class="slider"><span>下段</span><input type="range" id="fontScaleDetail" min="50" max="200" value="100"><span class="slider__val" id="fontScaleDetailVal">100%</span></label>
              <label class="slider"><span>字間</span><input type="range" id="letterSpacing" min="-5" max="30" value="0"><span class="slider__val" id="letterSpacingVal">0</span></label>
              <label class="slider"><span>行間</span><input type="range" id="lineSpacing" min="0" max="40" value="6"><span class="slider__val" id="lineSpacingVal">6</span></label>
              <div class="align-toggle">
                <button class="align-btn active" data-align="center" title="中央揃え">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10H6M21 6H3M21 14H3M18 18H6"/></svg>
                </button>
                <button class="align-btn" data-align="left" title="左揃え">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 10H3M21 6H3M21 14H3M17 18H3"/></svg>
                </button>
                <button class="align-btn" data-align="right" title="右揃え">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H7M21 6H3M21 14H3M21 18H7"/></svg>
                </button>
              </div>
              <label class="slider"><span>微調整</span><input type="range" id="textOffsetY" min="-30" max="30" value="0"><span class="slider__val" id="textOffsetYVal">0</span></label>
              <div class="valign-toggle">
                <button class="valign-btn" data-valign="top" title="上揃え">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
                </button>
                <button class="valign-btn active" data-valign="middle" title="中央">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button class="valign-btn" data-valign="bottom" title="下揃え">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M19 12l-7 7-7-7"/></svg>
                </button>
              </div>
              <label class="slider"><span>文字色</span><input type="color" id="textColor" value="#333333" class="color-input"></label>
            </div>
          </section>

          <section class="panel">
            <button class="panel__header"><span class="panel__title">コメント</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body"><input type="text" id="commentText" class="comment-input" placeholder="任意のテキスト" maxlength="100"></div>
          </section>

          <section class="panel">
            <button class="panel__header"><span class="panel__title">ロゴ</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body">
              <label class="file-upload"><input type="file" id="logoInput" accept="image/svg+xml,image/png" hidden><span class="file-upload__btn">SVG / PNG を選択</span></label>
              <label class="field"><span>位置</span><select id="logoPosition"><option value="bar-right">枠内 右下</option><option value="bar-left">枠内 左下</option><option value="photo-br">写真上 右下</option><option value="photo-bl">写真上 左下</option></select></label>
              <label class="slider"><span>サイズ</span><input type="range" id="logoSize" min="20" max="200" value="60"><span class="slider__val" id="logoSizeVal">60</span></label>
              <label class="slider"><span>透過</span><input type="range" id="logoOpacity" min="10" max="100" value="80"><span class="slider__val" id="logoOpacityVal">80%</span></label>
              <button id="logoClear" class="btn-ghost">ロゴ削除</button>
            </div>
          </section>

          <section class="panel">
            <button class="panel__header"><span class="panel__title">出力設定</span><svg class="panel__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
            <div class="panel__body">
              <div class="format-toggle"><button class="fmt active" data-fmt="jpeg">JPEG</button><button class="fmt" data-fmt="png">PNG</button></div>
              <label class="slider"><span>品質</span><input type="range" id="jpegQuality" min="50" max="100" value="92"><span class="slider__val" id="jpegQualityVal">92%</span></label>
            </div>
          </section>
        </aside>
      </div>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="lib/exifr.min.js"></script>
  <script src="lib/utif.js"></script>
  <script src="lib/libheif.js"></script>
  <script src="app.js"></script>
</body>
</html>
